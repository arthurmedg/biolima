<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="tabelas.css">
</head>

<body>

    <table border=1"> <!-- Estrutura da tabela -->

        <thead>
            <tr>
                <th>Nome</th> <!--Define o valor do cabeçalho-->
                <th>Idade</th>
                <th>Idade</th> <!--Define o valor do cabeçalho-->
                <th>Cidade</th> <!--Define o valor do cabeçalho-->
            </tr> <!--Linha (Table Roll)-->
        </thead> <!--Cabeçalho da tabela-->

        <tbody>
            <tr>
                <td>Arthur</td>
                <td>19</td>
                <td>São Paulo</td>
            </tr>
            <tr>
                <td>Igor</td>
                <td>17</td>
                <td>Carapicuiba</td>
            </tr>
            <tr>
                <td>Heitor</td>
                <td>39</td>
                <td>Linha 9 Esmeralda</td>
            </tr>
        </tbody> <!--Corpo da tabela-->

    </table>

</body>

</html>
