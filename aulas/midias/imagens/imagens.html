<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
</head>

<body>
    <!-- imagem na mesma pasta -->
    <img src="pinguim.png" alt="Penguins dançando">

    <!-- imagem pasta diferente -->
    <img src="images/arvrore.jpeg" alt="Árvores">

    <!-- Imagem com link da web -->
    <img src="https://cdn.pixabay.com/photo/2019/06/26/09/52/shit-image-4300034_1280.jpg" alt="Meditação">

    <!-- Mudando tamanho da imagem -->
    <img src="images/arvrore.jpeg" alt="Árvore" style="width: 50%;height:1000px;">

    <!-- Gif -->
    <img src="images/happy.gif" alt="Marcos" style="width: 50%; height: 50%;">

    <!-- Float para direcionar a imagem na página -->
    <img src="images/arvrore.jpeg" alt="" style="float:right;">
</body>

</html>
